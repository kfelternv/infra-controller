apiVersion: v1
kind: Service
metadata:
  name: {{ include "nico-dhcp-server.fullname" . }}
  labels:
    {{- include "nico-dhcp-server.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  internalTrafficPolicy: Local
  selector:
    {{- include "nico-dhcp-server.selectorLabels" . | nindent 4 }}
    {{- with .Values.serviceDaemonSet.labels }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  ports:
    - protocol: TCP
      port: {{ include "nico-dhcp-server.serverPort" . | int }}
      targetPort: {{ include "nico-dhcp-server.serverPort" . | int }}
