apiVersion: v1
kind: Service
metadata:
  name: {{ include "nico-otelcol.fullname" . }}
  labels:
    {{- include "nico-otelcol.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  internalTrafficPolicy: Local
  selector:
    {{- include "nico-otelcol.selectorLabels" . | nindent 4 }}
    {{- with .Values.serviceDaemonSet.labels }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  ports:
    - name: prometheus
      protocol: TCP
      port: {{ include "nico-otelcol.prometheusPort" . | int }}
      targetPort: {{ include "nico-otelcol.prometheusPort" . | int }}
