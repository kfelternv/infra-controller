## =============================================================================
## Prereqs secrets: Vault token, AppRole, SSH host key
## ESO handles: nico-roots (CA) via nico-roots-eso ClusterExternalSecret
## ESO handles: DB credentials via nico-db-eso ClusterExternalSecret
## Vault handles: PKI certs (via vault-nico-issuer ClusterIssuer)
## =============================================================================
{{- $sshPrivKey := include "prereqs.sshPrivateKey" . }}
{{- if .Values.vault.approleSecret.create }}
---
## nico-vault-approle-tokens: placeholder — vault-config-job (post-install hook)
## patches this secret with real role-id and secret-id fetched from Vault after
## AppRole auth is configured. The placeholder values here are overwritten before
## any nico-api or nico-bmc-proxy pod reads them.
apiVersion: v1
kind: Secret
metadata:
  name: nico-vault-approle-tokens
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  VAULT_ROLE_ID: ""
  VAULT_SECRET_ID: ""
{{- end }}
{{- if .Values.vault.tokenSecret.create }}
---
apiVersion: v1
kind: Secret
metadata:
  name: nico-vault-token
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  token: {{ .Values.vault.token | quote }}
{{- end }}
{{- if .Values.azureSSOClientSecretSecret.create }}
---
## azure-sso-nico-web-client-secret: Azure SSO client secret for nico-web.
## Set azureSSOClientSecret in values or patch this secret before starting nico-web
## if Azure SSO is enabled at your site. Leave empty if not using Azure SSO.
apiVersion: v1
kind: Secret
metadata:
  name: azure-sso-nico-web-client-secret
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  client_secret: {{ .Values.azureSSOClientSecret | default "" | quote }}
{{- end }}
{{- if .Values.sshHostKey.create }}
---
## SSH host key for nico-ssh-console-rs
## Generated inline by Helm — no Job, no network dependency.
## Private key: PKCS8 PEM (ed25519). Server derives public key at startup from private key.
## Idempotent: reuses existing secret on helm upgrade (lookup in _helpers.tpl).
apiVersion: v1
kind: Secret
metadata:
  name: ssh-host-key
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  ssh_host_ed25519_key: |
{{ $sshPrivKey | indent 4 }}
  ssh_host_ed25519_key_pub: ""
{{- end }}
