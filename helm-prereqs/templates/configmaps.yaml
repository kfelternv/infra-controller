## =============================================================================
## ConfigMaps for Vault connection info and database config
## Referenced by nico-api Deployment envFrom.
## =============================================================================
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-cluster-info
  namespace: {{ .Values.namespace }}
data:
  VAULT_SERVICE: {{ .Values.vault.address | quote }}
  NICO_VAULT_MOUNT: {{ .Values.vault.kvMount | quote }}
  NICO_VAULT_PKI_MOUNT: {{ .Values.vault.pkiMount | quote }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nico-system-nico-database-config
  namespace: {{ .Values.namespace }}
data:
  DB_HOST: {{ .Values.postgresql.host | quote }}
  DB_PORT: "5432"
  DB_NAME: "nico_system_nico"
